<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My girlies</title>

<style>
body{
    background:#e6e6fa;
    font-family: Georgia, serif;
    margin:0;
    text-align:center;
}

#cover{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.letter{
    background:white;
    padding:40px 60px;
    border-radius:6px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    font-size:28px;
}

.container{
    display:none;
    max-width:600px;
    margin:0 auto;
    padding-top:80px;
}

.top-image{
    width:220px;
    display:block;
    margin:0 auto 20px auto;
    cursor:pointer;
}

#text{
    font-size:18px;
    line-height:1.8;
    white-space:pre-line;
}
</style>
</head>

<body>

<div id="cover">
<div class="letter">
To my girlies
</div>
</div>

<div class="container" id="main">

<img id="topImage"
     src="received_944139307982434.jpeg"
     class="top-image"
     onclick="changeImage()">

<div id="text"></div>

</div>

<audio id="music" loop>
<source src="Ian Quiruz - ang balikat at baywang (Lyric video).mp3" type="audio/mpeg">
</audio>

<script>
  <div id="letter" class="letter">
      
const message = Thank you mga gf ko.
</p>   
<p>
I honestly don’t know how we function as a group… but somehow we do. Thanks for the chaos, the laughs, and for not replacing me (yet). I know kailan lang tayo naging magkaka-close (bakit kasi end pa ng s.y, le is che.) Pero kahit recently lang tayo, know that I love you both, always.`;

let i = 0;
let opened = false;

function type(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 28);
    }
}

function changeImage(){
    const img = document.getElementById("topImage");
    if(img.src.includes("received_944139307982434.jpeg")){
        img.src = "95be2a461518ca4762917bb7c70588fa.jpg";
    } else {
        img.src = "received_944139307982434.jpeg";
    }
}

document.addEventListener("click", function(){
    if(!opened){
        opened = true;
        document.getElementById("cover").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
        type();
    }
});
</script>

</body>
</html>
