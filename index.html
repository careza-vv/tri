<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grilies</title>

<link
href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body{
    background:#cb94f7;
    font-family: 'Patrick Hand', cursive;
    margin:0;
    text-align:center;
}

/* COVER IMAGE */
#cover{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

#cover img{
    width:260px;
    border-radius:6px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MAIN */
.container{
    display:none;
    max-width:700px;
    margin:0 auto;
    padding-top:60px;
}

.top-image{
    width:220px;
    display:block;
    margin:0 auto 20px auto;
    cursor:pointer;
}

.paper{
    background:#d6befa;
    padding:40px;
    border-radius:4px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:left;
}

#text{
    font-size:15px;
    line-height:1.9;
    white-space:pre-line;
}
</style>
</head>

<body>

<!-- COVER IMAGE -->
<div id="cover">
<img src="2d2e04da770cc25fda3810f8a5edce44.jpg">
</div>

<div class="container" id="main">

<img id="topImage"
     src="received_944139307982434.jpeg"
     class="top-image"
     onclick="changeImage()">

<div class="paper">
<div id="text"></div>
</div>

</div>

<audio id="music" loop>
<source src="Ian Quiruz - ang balikat at baywang (Lyric video).mp3" type="audio/mpeg">
</audio>

<script>
const message = `Kass, Ysa

We’re actually graduating… and I still can’t believe they’re letting the three of us leave together ( XD, LAWWWWL ). Thank you for surviving school with me — from cramming at the last minute, pretending we understood the lesson, to laughing when we were definitely supposed to be serious. We started as classmates, then somehow became a trio that shared notes, snacks, stress, and zero brain cells during chemistry quiz kahit wala naman si ma'am HAJHAHAHAHAHAHAHHAHA.

Thank you for the chaos, the inside jokes that no one else understands, the random deep talks, to the moments where we just looked at each other and knew we were all equally lost, and sa araw-araw na pang ba-bash sa u know who. Honestly, I don’t know how we made it this far, but I’m glad I did it with you two.

Even though we’re graduating and might go different ways, I hope we still stay the same — still loud, still supportive, still making fun of each other, and still meeting up like no time passed. School won’t be the same without you two, but I’m grateful for every memory we made.

Thanks for making these years less stressful and way more fun. I’ll miss our daily chaos, but I’m excited for what’s next for all of us. Congrats, my dearest girlfriends. Congrats sa atin. Walang iiyak sa graduation, pls, sampalin ko kau, sige.
Love you both always!

— ce`;

let i = 0;
let opened = false;

function type(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 22);
    }
}

function changeImage(){
    const img = document.getElementById("topImage");
    if(img.src.includes("received_944139307982434.jpeg")){
        img.src = "95be2a461518ca4762917bb7c70588fa.jpg";
    } else {
        img.src = "received_944139307982434.jpeg";
    }
}

document.addEventListener("click", function(){
    if(!opened){
        opened = true;
        document.getElementById("cover").style.display="none";
        document.getElementById("main").style.display="block";
        document.getElementById("music").play();
        type();
    }
});
</script>

</body>
</html>
